name: ci

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: make fmtcheck

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build
