name: ci

on:
  pull_request:
  push:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Local CI Stack
        run: make ci

      - name: Verify Pull Request Body
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          tmp_body="$(mktemp)"
          printf '%s' "$PR_BODY" >"$tmp_body"
          bash scripts/ci/verify-pr-template.sh "$tmp_body"
