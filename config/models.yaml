version: 1

# Adapter values are validated against the bootstrap executor catalog.
models:
  - key: codex-latest
    provider: openai
    access: plan_backed_cli
    adapter: codex_headless
    capabilities: [judgment, code, frontend, backend, review, planning, tools]
