cutover:
  pilot_projects:
    - key: pbs
      runtime_owner: odin_os
      primary_controller: odin_os
      stage: cutover
      comparison_context: odin-orchestrator
      legacy_primary_required: false
      shadow_graduation:
        - legacy and Odin readouts agree on project scope and ownership
        - no mutation attempt requires an allowed action
        - operator review confirms the project can stay read-only
      limited_action_graduation:
        - allowlisted isolated mutations complete successfully under Odin ownership
        - limited-action work never depends on legacy primary completion
        - operator review shows no unbounded approval or recovery drift
      cutover_graduation:
        - routine queued work completes under Odin OS ownership
        - normal project mutations no longer need legacy-primary intervention
        - rollback remains available and rehearsed
      legacy_duties_to_retire_in_order:
        - read-only observation and compare reporting
        - limited-action handling for allowlisted low-risk mutations
        - routine queue intake and run selection
        - normal project mutation and merge authority
        - legacy-primary fallback for routine completion
    - key: cfipros
      runtime_owner: legacy_odin
      primary_controller: legacy_odin
      stage: shadow
      comparison_context: odin-orchestrator
      legacy_primary_required: true
      shadow_graduation:
        - shadow readouts agree on repository scope and ownership
        - n8n payloads map cleanly to project-scoped Odin tasks
        - operator review confirms the project stays read-only while legacy is primary
      limited_action_graduation:
        - allowlisted isolated mutations complete successfully without legacy drift
        - limited-action work stays bounded to task-owned branches and worktrees
        - operator review confirms rollback remains trivial
      cutover_graduation:
        - routine queued work completes under Odin OS ownership
        - legacy-primary intervention is no longer needed for normal completion
        - rollback remains available and rehearsed
      legacy_duties_to_retire_in_order:
        - read-only observation and compare reporting
        - limited-action handling for allowlisted low-risk mutations
        - routine queue intake and run selection
        - normal project mutation and merge authority
        - legacy-primary fallback for routine completion
    - key: marcusgoll
      runtime_owner: legacy_odin
      primary_controller: legacy_odin
      stage: shadow
      comparison_context: odin-orchestrator
      legacy_primary_required: true
      shadow_graduation:
        - shadow readouts agree on repository scope and ownership
        - n8n payloads map cleanly to project-scoped Odin tasks
        - operator review confirms the project stays read-only while legacy is primary
      limited_action_graduation:
        - allowlisted isolated mutations complete successfully without legacy drift
        - limited-action work stays bounded to task-owned branches and worktrees
        - operator review confirms rollback remains trivial
      cutover_graduation:
        - routine queued work completes under Odin OS ownership
        - legacy-primary intervention is no longer needed for normal completion
        - rollback remains available and rehearsed
      legacy_duties_to_retire_in_order:
        - read-only observation and compare reporting
        - limited-action handling for allowlisted low-risk mutations
        - routine queue intake and run selection
        - normal project mutation and merge authority
        - legacy-primary fallback for routine completion
