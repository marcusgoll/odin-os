version: 1

projects:
  - key: odin-core
    name: Odin Core
    project_class: system_project
    system_project: true
    git_root: ..
    default_branch: main
    scheduler:
      max_concurrent_runs: 1
      max_starts_per_cycle: 1
      stalled_run_retry_limit: 2
    policy:
      allowed_commands:
        - status
        - test
        - build
      branch_rules:
        protected_branches:
          - main
        require_worktree: true
        require_task_branch: true
        allow_default_branch_mutation: false
      approval_gates:
        require_for_governance_changes: true
        require_for_destructive_operations: true
        require_for_system_project_changes: true
      merge_policy:
        mode: squash
        allow_direct_to_default_branch: false
      destructive_operations:
        allow_reset: false
        allow_clean: false
        allow_force_push: false
        require_explicit_approval: true
  - key: pbs
    name: PBS
    project_class: github_backed_project
    git_root: /home/orchestrator/pbs
    default_branch: master
    github:
      repo: marcusgoll/pbs
    scheduler:
      max_concurrent_runs: 1
      max_starts_per_cycle: 1
      stalled_run_retry_limit: 2
    policy:
      allowed_commands:
        - status
        - test
        - build
      branch_rules:
        protected_branches:
          - master
        require_worktree: true
        require_task_branch: true
        allow_default_branch_mutation: false
      approval_gates:
        require_for_governance_changes: true
        require_for_destructive_operations: true
        require_for_system_project_changes: false
      merge_policy:
        mode: squash
        allow_direct_to_default_branch: false
      destructive_operations:
        allow_reset: false
        allow_clean: false
        allow_force_push: false
        require_explicit_approval: true
  - key: cfipros
    name: CFIPros
    project_class: github_backed_project
    git_root: /home/orchestrator/cfipros
    default_branch: main
    github:
      repo: marcusgoll/cfipros
    scheduler:
      max_concurrent_runs: 1
      max_starts_per_cycle: 1
      stalled_run_retry_limit: 2
    policy:
      allowed_commands:
        - status
        - test
        - build
      branch_rules:
        protected_branches:
          - main
        require_worktree: true
        require_task_branch: true
        allow_default_branch_mutation: false
      approval_gates:
        require_for_governance_changes: true
        require_for_destructive_operations: true
        require_for_system_project_changes: false
      merge_policy:
        mode: squash
        allow_direct_to_default_branch: false
      destructive_operations:
        allow_reset: false
        allow_clean: false
        allow_force_push: false
        require_explicit_approval: true
  - key: marcusgoll
    name: Marcusgoll
    project_class: github_backed_project
    git_root: /home/orchestrator/marcusgoll
    default_branch: main
    github:
      repo: marcusgoll/marcusgoll
    scheduler:
      max_concurrent_runs: 1
      max_starts_per_cycle: 1
      stalled_run_retry_limit: 2
