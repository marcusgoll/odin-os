version: 1

work_taxonomy:
  categories:
    - Projects
    - Personal Admin
    - Software Development
    - Writing
    - Research
    - Calendar
    - Email
    - Finance/Admin
    - Household
    - Learning
    - Health/Wellbeing
    - Waiting For
    - Archive
  statuses:
    - inbox
    - needs_clarification
    - needs_review
    - approved_for_plan
    - approved_for_execution
    - in_progress
    - waiting_for
    - blocked
