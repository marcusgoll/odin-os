version: 1

executors:
  - key: codex_headless
    adapter: codex_headless
    class: plan_backed_cli
    enabled: true
    priority: 10
    model_ref: codex-latest
  - key: claude_code_headless
    adapter: claude_code_headless
    class: plan_backed_cli
    enabled: true
    priority: 20
    model_ref: claude-code-latest
  - key: gemini_cli_headless
    adapter: gemini_cli_headless
    class: plan_backed_cli
    enabled: true
    priority: 30
    model_ref: gemini-cli-latest
  - key: openai_api
    adapter: openai_api
    class: api_executor
    enabled: true
    priority: 40
    model_ref: gpt-5.4
  - key: anthropic_api
    adapter: anthropic_api
    class: api_executor
    enabled: true
    priority: 50
    model_ref: claude-sonnet
  - key: google_api
    adapter: google_api
    class: api_executor
    enabled: true
    priority: 60
    model_ref: gemini-pro
  - key: xai_api
    adapter: xai_api
    class: api_executor
    enabled: true
    priority: 70
    model_ref: grok-latest
  - key: openrouter_api
    adapter: openrouter_api
    class: broker_executor
    enabled: true
    priority: 80
    model_ref: broker-default

routes:
  - name: low-risk-frontend-build
    match:
      task_kinds: [general, build]
      scopes: [project, new-project]
      task_classes: [frontend_build]
      risk_classes: [low]
    preferred: [openrouter_api]
    fallback: [codex_headless]
    model_ref_overrides:
      openrouter_api: openrouter-kimi-k2-6
  - name: elevated-frontend-build
    match:
      task_kinds: [general, build]
      scopes: [project, new-project]
      task_classes: [frontend_build]
      risk_classes: [medium, high]
    preferred: [codex_headless]
    fallback: []
  - name: low-risk-backend-build
    match:
      task_kinds: [general, build]
      scopes: [project, new-project]
      task_classes: [backend_build]
      risk_classes: [low]
    preferred: [openrouter_api]
    fallback: [codex_headless]
    model_ref_overrides:
      openrouter_api: openrouter-kimi-k2-6
  - name: elevated-backend-build
    match:
      task_kinds: [general, build]
      scopes: [project, new-project]
      task_classes: [backend_build]
      risk_classes: [medium, high]
    preferred: [codex_headless]
    fallback: []
  - name: default
    match:
      task_kinds: [general, plan, build, review, qa]
      scopes: [global, odin-core, project, new-project]
    preferred: [codex_headless, claude_code_headless]
    fallback: [anthropic_api]
  - name: research
    match:
      task_kinds: [research]
      scopes: [global, project, odin-core]
    preferred: [codex_headless, claude_code_headless]
    fallback: []
