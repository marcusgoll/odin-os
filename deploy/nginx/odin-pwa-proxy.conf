pid /tmp/nginx.pid;
events {}

http {
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;
  access_log /dev/stdout;
  error_log /dev/stderr warn;

  upstream odin_container_app {
    server 127.0.0.1:9444;
  }

  server {
    listen 80;
    server_name odin.marcusgoll.com;
    absolute_redirect off;

    add_header X-Robots-Tag "noindex, nofollow" always;
    error_page 403 =404 /__not_found;

    proxy_http_version 1.1;
    proxy_connect_timeout 3s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;

    location = / {
      return 302 /app/;
    }

    location = /app {
      return 301 /app/;
    }

    location /app/ {
      proxy_pass http://odin_container_app;
    }

    location = /favicon.ico {
      proxy_pass http://odin_container_app;
    }

    location /mobile/ {
      proxy_pass http://odin_container_app;
    }

    location = /mobile {
      proxy_pass http://odin_container_app;
    }

    location = /healthz {
      proxy_pass http://odin_container_app;
    }

    location = /readyz {
      proxy_set_header Host odin.marcusgoll.com;
      proxy_pass http://odin_container_app;
    }

    location = /metrics {
      allow 127.0.0.1;
      allow 192.168.96.8;
      allow 192.168.96.0/20;
      deny all;
      proxy_set_header Host odin.marcusgoll.com;
      proxy_pass http://odin_container_app;
    }

    location = /webhooks/n8n/intake {
      proxy_set_header Host odin.marcusgoll.com;
      proxy_pass http://odin_container_app;
    }

    location = /__not_found {
      internal;
      return 404;
    }

    location = /browser/session/handoff {
      proxy_pass http://odin_container_app;
    }

    location = /browser/session/handoff/viewer {
      proxy_pass http://odin_container_app;
    }

    location /browser/session/handoff/viewer/proxy/ {
      proxy_pass http://odin_container_app;
    }

    location = /browser/session/handoff/complete {
      proxy_pass http://odin_container_app;
    }

    location / {
      return 404;
    }
  }
}
